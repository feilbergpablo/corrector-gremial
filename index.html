<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrector Gremial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Corrector Gremial</h1>
    <p>Escribí tu mensaje como salga, después corregilo.</p>

    <textarea id="inputText" placeholder="Escribí acá tu mensaje..."></textarea>

    <button id="corregirBtn">Corregir mensaje</button>

    <textarea id="outputText" placeholder="Acá aparecerá corregido..." readonly></textarea>

    <button id="copiarBtn">Copiar mensaje</button>
<button id="borrarBtn">Borrar todo</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
